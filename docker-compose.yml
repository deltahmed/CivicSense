version: '3.9'

services:
  # Base de données PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: civicsense-db
    environment:
      POSTGRES_DB: civicsense
      POSTGRES_USER: civicsense
      POSTGRES_PASSWORD: civicsense_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U civicsense"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Django
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: civicsense-backend
    command: bash -c "python manage.py migrate && python manage.py create_admin && python manage.py seed && gunicorn civicsense.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    env_file:
      - ./backend/.env
    environment:
      DB_ENGINE: django.db.backends.postgresql
      DB_HOST: db
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    restart: unless-stopped

  # Frontend React + Vite
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: civicsense-frontend
    ports:
      - "5173:5173"
    env_file:
      - ./frontend/.env
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  default:
    name: civicsense-network
